# Default config by gitlab with some changes

# Flutter's architecture does not allow aarch64,
# so use an amd64 architecture server

# Remember to check your artifact's path up since we did "cd app"

stages:
  - analyze
  - test
  - build
  - release

variables:
  FLUTTER_IMAGE: ghcr.io/cirruslabs/flutter:stable

default:
  image: $FLUTTER_IMAGE
  tags:
    - linux

cache:
  key: ${CI_PROJECT_ID}
  paths:
    - $HOME/.pub-cache/
    - app/build/

analyze:
  stage: analyze
  before_script:
    - cd app
    - flutter pub get
  script: flutter analyze

test:
  stage: test
  before_script:
    - cd app
    - flutter pub get
    - export PATH="$PATH:$HOME/.pub-cache/bin"
    - flutter pub global activate junitreport
  script:
    - set -o pipefail
    - flutter test --machine --coverage | tojunit -o report.xml
    - lcov --summary coverage/lcov.info
    - genhtml coverage/lcov.info --output-directory coverage_report
    - test -f report.xml || touch report.xml
  coverage: '/lines\.*: \d+\.\d+\%/'
  artifacts:
    name: test-results
    when: always
    paths:
      - app/report.xml
      - app/coverage_report/
    reports:
      junit: app/report.xml
    expire_in: 1 week


# Builds apk for release (on tag pushed)
build_apk:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - cd app
    - flutter pub get
    # TODO Temporary fix for ISP blocking (Idk why debug works while release doesn't)
    # - flutter build apk --release
    - flutter build apk --debug 
  artifacts:
    paths:
      - app/build/app/outputs/flutter-apk/app-debug.apk
      # - app/build/app/outputs/flutter-apk/app-release.apk
    expire_in: 1 week


# Release the apk (on tag pushed)
release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    description: "Automated release generated by GitLab CI"
    assets:
      links:
        - name: "App APK (Build)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/app/build/app/outputs/flutter-apk/app-debug.apk?job=build_apk"